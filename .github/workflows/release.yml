name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Build Inno Setup installer
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: >-
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          "/DBinDir=..\target\x86_64-pc-windows-msvc\release"
          "installer\setup.iss"

      - name: Prepare artifacts
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/linker"
          [ -f "${BIN}.exe" ] && BIN="${BIN}.exe"

          EXT=""
          [[ "${{ matrix.target }}" == *windows* ]] && EXT=".exe"

          cp "$BIN" "linker-${{ matrix.target }}${EXT}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: linker-${{ matrix.target }}
          path: linker-${{ matrix.target }}*

      - name: Upload installer artifact
        if: matrix.target == 'x86_64-pc-windows-msvc'
        uses: actions/upload-artifact@v4
        with:
          name: linker-installer-windows
          path: installer/output/linker-installer-*.exe

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
